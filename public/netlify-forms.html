<!DOCTYPE html>
<html>
<head><title>Netlify Forms Detection</title></head>
<body>
  <!-- Netlify Forms detection shim for @netlify/plugin-nextjs v5 -->
  <!-- See: https://ntl.fyi/next-runtime-forms-migration -->
  <form name="companion-feedback" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="companion-feedback">
    <input name="bot-field">
    <input name="name">
    <input name="email">
    <input name="message">
    <input name="type">
    <input name="page">
  </form>
</body>
</html>
